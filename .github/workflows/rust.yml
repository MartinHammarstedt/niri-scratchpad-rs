name: Build Binary
on: [workflow_dispatch] # Allows you to click a button to start
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable
      - name: Build
        run: cargo build --release
      - name: List files
        run: ls -R target/release/
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: niri-scratchpad-rs
          path: target/release/niri-scratchpad
